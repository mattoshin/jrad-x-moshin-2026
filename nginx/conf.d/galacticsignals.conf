# ── Redirect HTTP → HTTPS ────────────────────────────────────────
server {
    listen 80;
    server_name galacticsignals.com www.galacticsignals.com api.galacticsignals.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Frontend: galacticsignals.com ────────────────────────────────
server {
    listen 443 ssl;
    server_name galacticsignals.com www.galacticsignals.com;

    ssl_certificate     /etc/letsencrypt/live/galacticsignals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/galacticsignals.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Backend API: api.galacticsignals.com ─────────────────────────
server {
    listen 443 ssl;
    server_name api.galacticsignals.com;

    ssl_certificate     /etc/letsencrypt/live/galacticsignals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/galacticsignals.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/html/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS on;
    }
}
